<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth - Voxara</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-container {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-header {
            margin-bottom: 30px;
        }

        .auth-header i {
            font-size: 3rem;
            background: linear-gradient(135deg, var(--theme-color-1), var(--theme-color-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px;
            border-radius: 12px;
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: none;
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: var(--transition);
        }

        .auth-tab.active {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--theme-color-1);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px var(--theme-accent);
        }

        .auth-submit {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--theme-color-1), var(--theme-color-2));
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }

        .auth-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--theme-accent);
        }

        .error-message {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
        }

        .back-link {
            margin-top: 25px;
            display: block;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .back-link:hover {
            color: var(--theme-color-1);
        }
    </style>
</head>
<body>
    <div class="aurora-bg"></div>
    
    <div class="auth-container">
        <header class="auth-header">
            <i class="fa-solid fa-bolt"></i>
            <h1>Voxara</h1>
            <p id="auth-desc">Welcome back to the future of voting.</p>
        </header>

        <div class="auth-tabs">
            <button class="auth-tab active" id="tab-login">Login</button>
            <button class="auth-tab" id="tab-signup">Sign Up</button>
        </div>

        <form id="auth-form">
            <div class="form-group" id="name-group" style="display: none;">
                <label for="auth-name">Full Name</label>
                <input type="text" id="auth-name" placeholder="John Doe">
            </div>
            <div class="form-group">
                <label for="auth-email">Email Address</label>
                <input type="email" id="auth-email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="auth-password">Password</label>
                <input type="password" id="auth-password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="auth-submit" id="submit-btn">Continue</button>
        </form>

        <p class="error-message" id="error-msg">Incorrect email or password. Please try again.</p>

        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
    </div>

    <script type="module" src="auth.js"></script>
</body>
</html>
